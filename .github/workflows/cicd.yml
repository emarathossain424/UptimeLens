name: Ci-CD Pipeline

on: push # Trigger on push to any branch

jobs:
  setup-laravel: # Job to set up Laravel environment
    runs-on: ubuntu-latest # Use the latest Ubuntu runner
    steps:
      - name: Checkout Code # Step to checkout the code from the repository
        uses: actions/checkout@v4

      - name: Setup Php # Step to set up PHP environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, bcmath, gd, fileinfo, json, openssl
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Install Composer Dependencies # Step to install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          composer dump-autoload --optimize

      - name: Copy Environment File + Generate Key + Cache Config # Step to copy the environment file, generate application key, and cache configuration
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:cache

      - name: upload env, vendor, composer-lock directory # Step to upload environment file, vendor directory, and composer.lock file as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laravel-env-vendor-composer-lock
          path: |
            .env
            vendor/
            composer.lock

      - name: Setup Mysql # Step to set up MySQL database
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql root password: root
          mysql root user: developer
          mysql database: uptime_lens

      - name: Run Migrations # Step to run database migrations
        env:
          APP_ENV: testing
        run: |
          php artisan migrate

  run-unit-tests: # Job to run unit tests
    runs-on: ubuntu-latest
    needs: setup-laravel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download env, vendor, composer-lock directory
        uses: actions/download-artifact@v4
        with:
          name: laravel-env-vendor-composer-lock
          path: downloaded-artifacts

      - name: Move downloaded files to project root
        run: |
          mv downloaded-artifacts/.env .env
          mv downloaded-artifacts/vendor ./vendor
          mv downloaded-artifacts/composer.lock composer.lock


      - name: Setup Php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, bcmath, gd, fileinfo, json, openssl
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Setup Mysql
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql root password: root
          mysql root user: developer
          mysql database: uptime_lens

      - name: Generate Key + Cache Config # Step to generate application key, and cache configuration
        run: |
          php artisan key:generate
          php artisan config:cache

      - name: Run Migrations # Step to run database migrations
        env:
          APP_ENV: testing
        run: |
          php artisan migrate

      - name: Run tests
        run: |
          php artisan test --env=testing



